# Puerto del servidor (default 8080, puedes cambiarlo)
server.port=8080

# Logs más limpios durante el desarrollo (la salida JSON hacia Logstash
# se define aparte en logback-spring.xml)
logging.level.com.chat=DEBUG
logging.level.org.springframework.web.socket=INFO

# ── Observabilidad ──────────────────────────────────────

# Nombre de la app: tag global que identifica este servicio en
# Grafana, Zipkin y Kibana cuando haya varios servicios
spring.application.name=ws-chat
management.metrics.tags.application=ws-chat

# Exponer Prometheus y otros endpoints de Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true

# URL del servidor Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Porcentaje de operaciones a trazar:
# 1.0 = 100% (ideal para desarrollo)
# 0.1 = 10%  (recomendado para producción con alto tráfico)
management.tracing.sampling.probability=1.0
