input {
  tcp {
    port  => 5000
    codec => json_lines  # Parsea el JSON que emite Logback
  }
}

filter {
  date {
    match  => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "ws-chat-logs-%{+YYYY.MM.dd}"  # Índice diario
  }
  stdout { codec => rubydebug }  # Debug en consola de Logstash
}
